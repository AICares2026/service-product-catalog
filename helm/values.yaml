service:
  name: service-product-catalog
  namespace: aicares
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/product-catalog
  tag: latest
  pullPolicy: Always
containerPort: 3550
resources:
  limits:
    memory: "20Mi"
  requests:
    memory: "10Mi"
    cpu: "50m"
env:
  - name: PRODUCT_CATALOG_PORT
    value: "3550"
  - name: FLAGD_HOST
    value: "flagd"
  - name: FLAGD_PORT
    value: "8013"
  - name: OTEL_SERVICE_NAME
    value: "product-catalog"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector:4317"
  - name: DB_CONNECTION_STRING
    value: "postgres://astronomy_user:astronomy_password@postgresql/astronomy_db?sslmode=disable"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers

